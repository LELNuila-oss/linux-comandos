<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>425 Comandos Linux 🐧</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--t:#f0f0ff;--m:#8888aa;--term:#0d1117;
  --c1:#ff6b6b;--c2:#ffd93d;--c3:#6bcb77;--c4:#4d96ff;--c5:#c77dff;--c6:#ff9f43;--c7:#00d2ff;--c8:#f8a5c2}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'Nunito',sans-serif;min-height:100vh}
header{text-align:center;padding:50px 20px 30px;position:relative;z-index:1}
.pen{font-size:70px;display:block;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;background:linear-gradient(135deg,var(--c2),var(--c1),var(--c5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.sub{font-size:1.1rem;color:var(--m);font-weight:700}
.ctrl{max-width:1100px;margin:0 auto 20px;padding:0 20px;display:flex;flex-direction:column;gap:14px;align-items:center;position:relative;z-index:1}
.sbox{width:100%;max-width:520px;position:relative}
.sbox input{width:100%;padding:13px 20px 13px 48px;background:var(--card);border:2px solid #333355;border-radius:50px;color:var(--t);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;outline:none;transition:border-color .3s}
.sbox input:focus{border-color:var(--c4)}
.sbox input::placeholder{color:var(--m)}
.sico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.2rem}
.fbts,.tbts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.fbt{padding:7px 16px;border-radius:50px;border:2px solid transparent;background:var(--card);color:var(--m);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s}
.fbt:hover,.fbt.on{color:var(--t);transform:scale(1.05)}
.tlb{font-size:.78rem;font-weight:800;color:var(--m)}
.tbt{padding:5px 13px;border-radius:50px;border:1px solid;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:800;cursor:pointer;background:transparent;transition:opacity .2s}
.tbt:hover{opacity:.7}
.tbt.on{outline:2px solid currentColor;outline-offset:1px}
.t-all{color:#aaa;border-color:#555}
.t-cmd{color:var(--c3);border-color:rgba(107,203,119,.5);background:rgba(107,203,119,.08)}
.t-ins{color:var(--c1);border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.08)}
.t-sin{color:var(--c4);border-color:rgba(77,150,255,.5);background:rgba(77,150,255,.08)}
.t-ata{color:var(--c2);border-color:rgba(255,217,61,.5);background:rgba(255,217,61,.08)}
.stats{max-width:1100px;margin:0 auto 16px;padding:0 20px;display:flex;justify-content:center;position:relative;z-index:1}
.spill{background:var(--card);border-radius:50px;padding:6px 20px;font-size:.82rem;font-weight:800;color:var(--m)}
.spill b{color:var(--t)}
.grid{max-width:1400px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;position:relative;z-index:1}
.card{background:var(--card);border-radius:18px;padding:20px;border:2px solid #1e1e3a;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;border-radius:18px 18px 0 0}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 36px rgba(0,0,0,.4)}
.ca .card::before{background:linear-gradient(90deg,var(--c3),var(--c4))}.ca .card:hover{border-color:var(--c3)}
.cd .card::before{background:linear-gradient(90deg,var(--c4),var(--c5))}.cd .card:hover{border-color:var(--c4)}
.cs .card::before{background:linear-gradient(90deg,var(--c1),var(--c6))}.cs .card:hover{border-color:var(--c1)}
.cr .card::before{background:linear-gradient(90deg,var(--c5),var(--c1))}.cr .card:hover{border-color:var(--c5)}
.cp .card::before{background:linear-gradient(90deg,var(--c2),var(--c6))}.cp .card:hover{border-color:var(--c2)}
.cb .card::before{background:linear-gradient(90deg,var(--c6),var(--c3))}.cb .card:hover{border-color:var(--c6)}
.cpr .card::before{background:linear-gradient(90deg,var(--c7),var(--c4))}.cpr .card:hover{border-color:var(--c7)}
.ct .card::before{background:linear-gradient(90deg,var(--c8),var(--c5))}.ct .card:hover{border-color:var(--c8)}
.cpq .card::before{background:linear-gradient(90deg,var(--c3),var(--c2))}.cpq .card:hover{border-color:var(--c3)}
.ch .card::before{background:linear-gradient(90deg,var(--c6),var(--c1))}.ch .card:hover{border-color:var(--c6)}
.csh .card::before{background:linear-gradient(90deg,var(--c4),var(--c7))}.csh .card:hover{border-color:var(--c4)}
.cdi .card::before{background:linear-gradient(90deg,var(--c1),var(--c8))}.cdi .card:hover{border-color:var(--c1)}
.ch2{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.emo{font-size:2rem;line-height:1;flex-shrink:0}
.titb{flex:1;min-width:0}
.cname{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;word-break:break-all}
.bdgs{display:flex;gap:4px;flex-wrap:wrap}
.cbdg{padding:2px 8px;border-radius:50px;font-size:.6rem;font-weight:800;text-transform:uppercase}
.bca{background:rgba(107,203,119,.2);color:var(--c3)}.bcd{background:rgba(77,150,255,.2);color:var(--c4)}
.bcs{background:rgba(255,107,107,.2);color:var(--c1)}.bcr{background:rgba(199,125,255,.2);color:var(--c5)}
.bcp{background:rgba(255,217,61,.2);color:var(--c2)}.bcb{background:rgba(255,159,67,.2);color:var(--c6)}
.bcpr{background:rgba(0,210,255,.2);color:var(--c7)}.bct{background:rgba(248,165,194,.2);color:var(--c8)}
.bcpq{background:rgba(107,203,119,.2);color:var(--c3)}.bch{background:rgba(255,159,67,.2);color:var(--c6)}
.bcsh{background:rgba(77,150,255,.2);color:var(--c4)}.bcdi{background:rgba(255,107,107,.2);color:var(--c1)}
.tbdg{padding:2px 8px;border-radius:50px;font-size:.6rem;font-weight:800;border:1px solid}
.tbr{color:var(--c3);border-color:rgba(107,203,119,.4);background:rgba(107,203,119,.1)}
.tbi{color:var(--c1);border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.1)}
.tbs{color:var(--c4);border-color:rgba(77,150,255,.4);background:rgba(77,150,255,.1)}
.tba{color:var(--c2);border-color:rgba(255,217,61,.4);background:rgba(255,217,61,.1)}
.csimple{font-size:.9rem;font-weight:700;color:var(--m);margin-bottom:8px;line-height:1.4}
.cexp{font-size:.85rem;font-weight:700;color:#c8c8e8;margin-bottom:14px;line-height:1.5;background:rgba(255,255,255,.04);border-radius:10px;padding:9px 11px;border-left:3px solid #444}
.ca .cexp{border-left-color:var(--c3)}.cd .cexp{border-left-color:var(--c4)}.cs .cexp{border-left-color:var(--c1)}
.cr .cexp{border-left-color:var(--c5)}.cp .cexp{border-left-color:var(--c2)}.cb .cexp{border-left-color:var(--c6)}
.cpr .cexp{border-left-color:var(--c7)}.ct .cexp{border-left-color:var(--c8)}.cpq .cexp{border-left-color:var(--c3)}
.ch .cexp{border-left-color:var(--c6)}.csh .cexp{border-left-color:var(--c4)}.cdi .cexp{border-left-color:var(--c1)}
.trm{background:var(--term);border-radius:9px;overflow:hidden;border:1px solid #2a2a3a}
.tbar{background:#21213a;padding:7px 11px;display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28ca42}
.tlbl{font-family:'Space Mono',monospace;font-size:.6rem;color:#555577;margin-left:auto}
.tbody{padding:10px 14px}
.tline{font-family:'Space Mono',monospace;font-size:.78rem;margin-bottom:3px;display:flex;gap:6px;flex-wrap:wrap}
.pr{color:var(--c3)}.pra{color:var(--c2)}.prsi{color:var(--c4)}
.ctxt{color:#f0f0ff}.otxt{color:#8888aa;font-size:.74rem}
.nores{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--m)}
.nores span{font-size:4rem;display:block;margin-bottom:12px}
footer{text-align:center;padding:30px;color:var(--m);font-size:.85rem;font-weight:700}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <span class="pen">🐧</span>
  <h1>425 Comandos de Linux</h1>
  <p class="sub">¡Explicados para que los entienda hasta un niño de 5 años! 🚀</p>
</header>
<div class="ctrl">
  <div class="sbox">
    <span class="sico">🔍</span>
    <input type="text" id="search" placeholder="Busca un comando...">
  </div>
  <div class="fbts" id="catBtns">
    <button class="fbt on" data-cat="all">⭐ Todos</button>
    <button class="fbt" data-cat="archivos">📄 Archivos</button>
    <button class="fbt" data-cat="directorios">📁 Directorios</button>
    <button class="fbt" data-cat="sistema">⚙️ Sistema</button>
    <button class="fbt" data-cat="procesos">⚡ Procesos</button>
    <button class="fbt" data-cat="red">🌐 Red</button>
    <button class="fbt" data-cat="permisos">🔐 Permisos</button>
    <button class="fbt" data-cat="busqueda">🔎 Búsqueda</button>
    <button class="fbt" data-cat="texto">✏️ Texto</button>
    <button class="fbt" data-cat="paquetes">📦 Paquetes</button>
    <button class="fbt" data-cat="hardware">🖥️ Hardware</button>
    <button class="fbt" data-cat="shell">🐚 Shell</button>
    <button class="fbt" data-cat="disco">💾 Disco</button>
  </div>
  <div class="tbts" id="tipoBtns">
    <span class="tlb">🏷️ Tipo:</span>
    <button class="tbt t-all on" data-tipo="all">Todos</button>
    <button class="tbt t-cmd" data-tipo="comando">✅ Comando real</button>
    <button class="tbt t-ins" data-tipo="instalar">📦 Requiere instalación</button>
    <button class="tbt t-sin" data-tipo="sintaxis">🔷 Sintaxis bash</button>
    <button class="tbt t-ata" data-tipo="atajo">⌨️ Atajo teclado</button>
  </div>
</div>
<div class="stats"><div class="spill">Mostrando <b id="cnt">0</b> de <b id="tot">0</b></div></div>
<div class="grid" id="grid"></div>
<footer>🐧 Hecho con ❤️ para aprender Linux de forma divertida</footer>
<script src="data.js"></script>
<script>
(function(){
  document.getElementById('tot').textContent = CMDS.length;
  var CAT_CLS={archivos:'ca',directorios:'cd',sistema:'cs',red:'cr',permisos:'cp',busqueda:'cb',procesos:'cpr',texto:'ct',paquetes:'cpq',hardware:'ch',shell:'csh',disco:'cdi'};
  var CAT_BCL={archivos:'bca',directorios:'bcd',sistema:'bcs',red:'bcr',permisos:'bcp',busqueda:'bcb',procesos:'bcpr',texto:'bct',paquetes:'bcpq',hardware:'bch',shell:'bcsh',disco:'bcdi'};
  var TIPO_INFO={comando:{badge:'✅ Comando real',cls:'tbr'},instalar:{badge:'📦 Instalar primero',cls:'tbi'},sintaxis:{badge:'🔷 Sintaxis bash',cls:'tbs'},atajo:{badge:'⌨️ Atajo teclado',cls:'tba'}};
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function card(c){
    var ti=TIPO_INFO[c.tipo]||TIPO_INFO.comando;
    var cc=CAT_CLS[c.cat]||'ca';
    var bc=CAT_BCL[c.cat]||'bca';
    var pr=c.tipo==='atajo'?'<span class="pra">⌨️</span>':c.tipo==='sintaxis'?'<span class="prsi">bash$</span>':'<span class="pr">$</span>';
    var outLines=c.output.split('\n').map(function(l){return '<div class="tline"><span class="otxt">'+esc(l)+'</span></div>';}).join('');
    return '<div class="'+cc+'"><div class="card">'+
      '<div class="ch2"><span class="emo">'+c.emoji+'</span>'+
      '<div class="titb"><div class="cname">'+esc(c.name)+'</div>'+
      '<div class="bdgs"><span class="cbdg '+bc+'">'+esc(c.cat)+'</span>'+
      '<span class="tbdg '+ti.cls+'">'+ti.badge+'</span></div></div></div>'+
      '<div class="csimple">'+esc(c.simple)+'</div>'+
      '<div class="cexp">'+esc(c.explain)+'</div>'+
      '<div class="trm"><div class="tbar"><span class="dot dr"></span><span class="dot dy"></span><span class="dot dg"></span><span class="tlbl">terminal</span></div>'+
      '<div class="tbody"><div class="tline">'+pr+'<span class="ctxt">'+esc(c.example)+'</span></div>'+outLines+'</div></div></div></div>';
  }
  var activeCat='all',activeTipo='all';
  function render(){
    var q=document.getElementById('search').value.toLowerCase().trim();
    var list=CMDS.filter(function(c){
      if(activeCat!=='all'&&c.cat!==activeCat)return false;
      if(activeTipo!=='all'&&c.tipo!==activeTipo)return false;
      if(q&&c.name.toLowerCase().indexOf(q)<0&&c.simple.toLowerCase().indexOf(q)<0&&c.explain.toLowerCase().indexOf(q)<0)return false;
      return true;
    });
    document.getElementById('cnt').textContent=list.length;
    var grid=document.getElementById('grid');
    if(!list.length){grid.innerHTML='<div class="nores"><span>🤔</span><p>No encontré ese comando...</p></div>';return;}
    grid.innerHTML=list.map(card).join('');
  }
  document.getElementById('catBtns').addEventListener('click',function(e){
    var b=e.target.closest('.fbt');if(!b)return;
    document.querySelectorAll('.fbt').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');activeCat=b.getAttribute('data-cat');render();
  });
  document.getElementById('tipoBtns').addEventListener('click',function(e){
    var b=e.target.closest('.tbt');if(!b)return;
    document.querySelectorAll('.tbt').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');activeTipo=b.getAttribute('data-tipo');render();
  });
  document.getElementById('search').addEventListener('input',render);
  render();
})();
</script>
</body>
</html>
